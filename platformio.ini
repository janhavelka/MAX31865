[platformio]
src_dir = .
default_envs = ex_bringup_s3

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_eol = LF
monitor_echo = yes
monitor_filters = send_on_enter, colorize
build_flags =
  -std=c++17
  -Wall
  -Wextra
  -Werror=return-type
  -Iinclude
  -Iexamples
  -DCORE_DEBUG_LEVEL=0
build_src_filter =
  -<*>
  +<src/**>
  +<include/**>
  +<examples/01_basic_bringup_cli/**>
  +<examples/common/**>

[env:ex_bringup_s3]
board = esp32-s3-devkitc-1
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = default.csv
extra_scripts = pre:scripts/generate_version.py
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

[env:ex_bringup_s2]
board = esp32-s2-saola-1
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = default.csv
board_upload.after_reset = no_reset_stub
extra_scripts = pre:scripts/generate_version.py
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=1

[env:ex_api_smoke_s3]
board = esp32-s3-devkitc-1
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = default.csv
extra_scripts = pre:scripts/generate_version.py
build_src_filter =
  -<*>
  +<src/**>
  +<include/**>
  +<examples/02_api_smoke/**>
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
